openapi: 3.1.0
info:
  title: AgentWarden API
  version: 0.1.0
  summary: Pre-sign EVM transaction security analysis for AI agents.
servers:
  - url: http://localhost:8787
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - service
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
  /analyze:
    post:
      summary: Analyze an unsigned EVM transaction before signing
      description: Returns a deterministic security report with an ALLOW, WARN, or BLOCK verdict.
      operationId: analyzeTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: Security report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityReport"
        "400":
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Payment required when x402 is enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    Hex:
      type: string
      pattern: "^0x([a-fA-F0-9]{2})*$"
      maxLength: 131074
      description: 0x-prefixed hex capped at 64 KiB of calldata.
    DecimalString:
      type: string
      pattern: "^\\d+$"
    AnalysisRequest:
      type: object
      required:
        - intent
        - transaction
      properties:
        requestId:
          type: string
        intent:
          $ref: "#/components/schemas/TransactionIntent"
        transaction:
          $ref: "#/components/schemas/UnsignedEvmTransaction"
    TransactionIntent:
      type: object
      required:
        - action
        - chainId
        - from
      properties:
        intentId:
          type: string
        action:
          enum:
            - transfer
            - approve
            - contract_call
            - native_transfer
            - token_transfer
            - approval
            - nft_transfer
            - swap
            - multicall
            - deployment
        chainId:
          type: integer
          minimum: 1
        from:
          $ref: "#/components/schemas/Address"
        tokenAddress:
          $ref: "#/components/schemas/Address"
        recipient:
          $ref: "#/components/schemas/Address"
        spender:
          $ref: "#/components/schemas/Address"
        amount:
          $ref: "#/components/schemas/DecimalString"
        maxAmount:
          $ref: "#/components/schemas/DecimalString"
        tokenId:
          $ref: "#/components/schemas/DecimalString"
        allowNativeValue:
          type: boolean
        allowUnlimitedApproval:
          type: boolean
        allowOperatorApproval:
          type: boolean
        allowEip7702Authorization:
          type: boolean
        description:
          type: string
    UnsignedEvmTransaction:
      type: object
      required:
        - chainId
        - from
        - data
      properties:
        chainId:
          type: integer
          minimum: 1
        from:
          $ref: "#/components/schemas/Address"
        to:
          $ref: "#/components/schemas/Address"
        value:
          $ref: "#/components/schemas/DecimalString"
        data:
          $ref: "#/components/schemas/Hex"
        type:
          oneOf:
            - type: integer
            - type: string
        accessList:
          type: array
          items: {}
        authorizationList:
          type: array
          items: {}
        blobVersionedHashes:
          type: array
          items:
            $ref: "#/components/schemas/Hex"
        maxFeePerBlobGas:
          $ref: "#/components/schemas/DecimalString"
    SecurityReport:
      type: object
      required:
        - verdict
        - riskScore
        - summary
        - explanation
        - findings
        - recommendedAction
        - transactionEnvelope
        - actionType
        - decodedActions
        - assetDeltas
        - approvalFindings
        - decodedTransaction
        - policyViolations
        - simulationResult
        - reportHash
      properties:
        requestId:
          type: string
        verdict:
          enum:
            - ALLOW
            - WARN
            - BLOCK
        riskScore:
          type: integer
          minimum: 0
          maximum: 100
        riskVector:
          $ref: "#/components/schemas/RiskVector"
        summary:
          type: string
        explanation:
          type: string
        findings:
          type: array
          items:
            type: object
        recommendedAction:
          type: string
        transactionEnvelope:
          type: object
        actionType:
          type: string
        decodedActions:
          type: array
          items:
            type: object
        assetDeltas:
          type: array
          items:
            type: object
        approvalFindings:
          type: array
          items:
            type: object
        benchmarkProfile:
          enum:
            - agentkit
            - goat
            - eliza
            - generic
        decodedTransaction:
          type: object
        policyViolations:
          type: array
          items:
            type: object
        simulationResult:
          type: object
        saferAlternative:
          type: string
        reportHash:
          type: string
          pattern: "^0x[a-f0-9]{64}$"
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
    RiskVector:
      type: object
      required:
        - contractRisk
        - tokenRisk
        - behaviorRisk
        - intentDelta
        - sanctionsRisk
        - simulationRisk
      properties:
        contractRisk:
          type: integer
          minimum: 0
          maximum: 100
        tokenRisk:
          type: integer
          minimum: 0
          maximum: 100
        behaviorRisk:
          type: integer
          minimum: 0
          maximum: 100
        intentDelta:
          type: integer
          minimum: 0
          maximum: 100
        sanctionsRisk:
          type: integer
          minimum: 0
          maximum: 100
        simulationRisk:
          type: integer
          minimum: 0
          maximum: 100
